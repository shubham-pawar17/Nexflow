<svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradWave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A59"/>
      <stop offset="100%" stop-color="#FFB38A"/>
    </linearGradient>
  </defs>

  <!-- Wave Icon -->
